# ?????????????????????????????????????????????????????????????????
# config/default.properties ? local development defaults
# Override any key via environment variables (highest priority)
# ?????????????????????????????????????????????????????????????????

# API under test
BASE_URL=https://petstore.swagger.io/v2

# Timeouts
REQUEST_TIMEOUT_MS=10000
RESPONSE_TIME_SLA_MS=3000

# Retries on flaky 5xx
MAX_RETRIES=2

# Auth (leave blank for public PetStore API)
API_KEY=
BEARER_TOKEN=

# Logging ? set to true locally for debugging, false in CI
LOG_ALL_REQUESTS=false

# Allure ? always attach req/resp in CI for failure visibility
ALLURE_ATTACH_ALWAYS=true

# AI Test Generator
LLM_API_URL=https://api.anthropic.com/v1/messages
LLM_API_KEY=
LLM_MODEL=claude-sonnet-4-20250514
AI_OUTPUT_DIR=api/src/test/java/com/aitesting/api/aigenerated
